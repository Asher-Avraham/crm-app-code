name: CI workflow for CRM app

on:
    push:
        branches:
            - main
jobs:
    generate-version:
        runs-on: ubuntu-latest
        outputs:
            new_version: ${{ steps.set_version.outputs.new_version }}
        steps:
            - uses: actions/checkout@v3
            - name: Check for version file and increment version
              id: set_version
              run: |
                  VERSION_FILE="version.txt"
                  if [ ! -f "$VERSION_FILE" ]; then
                    echo "1.0.0" > "$VERSION_FILE"
                    echo "Created new version file with version 1.0.0"
                  fi
                  current_version=$(cat "$VERSION_FILE")
                  echo "Current version: $current_version"
                  IFS='.' read -ra VERSION_PARTS <<< "$current_version"
                  MAJOR=${VERSION_PARTS[0]}
                  MINOR=${VERSION_PARTS[1]}
                  PATCH=$((${VERSION_PARTS[2]} + 1))
                  new_version="${MAJOR}.${MINOR}.${PATCH}"
                  echo "New version: $new_version"
                  echo "$new_version" > "$VERSION_FILE"
                  echo "new_version=$new_version" >> $GITHUB_OUTPUT
            - name: Commit and push new version
              run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com
                  git add version.txt
                  git commit -m "Bump version to ${{ steps.set_version.outputs.new_version }}"
                  git remote set-url origin "https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
                  git push origin
            - name: Create and push tag
              run: |
                  git tag -a v${{ steps.set_version.outputs.new_version }} -m "Version ${{ steps.set_version.outputs.new_version }}"
                  git push origin v${{ steps.set_version.outputs.new_version }}

    setup-and-build:
        needs: generate-version
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: Install dependencies
              run: yarn install
            - name: Build app
              run: yarn build
            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: build-artifacts
                  path: ./.next
                  include-hidden-files: true

    test:
        needs: setup-and-build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: build-artifacts
                  path: .next
            - name: Install dependencies
              run: yarn install
            - name: Run and test app
              run: |
                  yarn start &
                  max_attempts=30
                  attempt=1
                  until curl -s http://localhost:3000/health || [ $attempt -eq $max_attempts ]
                  do
                    echo "Attempt $attempt: Waiting for application to be ready..."
                    sleep 2
                    attempt=$((attempt + 1))
                  done
                  if [ $attempt -eq $max_attempts ]; then
                    echo "Application failed to start within timeout"
                    exit 1
                  fi
                  # Run the actual tests
                  curl http://localhost:3000 --fail --connect-timeout 10 --max-time 30
                  pkill node || (echo "Failed to stop Node process." && exit 1)

    docker-build:
        needs: setup-and-build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: build-artifacts
                  path: .next
            - name: Read version file
              id: version
              uses: juliangruber/read-file-action@v1
              with:
                  path: ./version.txt
            - name: Build and test Docker image
              run: |
                  VERSION=$(echo "${{ steps.version.outputs.content }}" | tr -d '\n')
                  docker build -t crm-app:${VERSION} -t crm-app:${GITHUB_SHA} .
                  docker compose up -d
                  sleep 5
                  curl http://localhost:80 --fail --connect-timeout 10 --max-time 30
                  docker compose down
            - name: Save and upload Docker image
              run: |
                  docker save crm-app:$(cat version.txt) > image.tar
            - name: Upload Docker image
              uses: actions/upload-artifact@v4
              with:
                  name: docker-image
                  path: image.tar

    docker-push:
        needs: docker-build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v3
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}
            - name: Download and load Docker image
              uses: actions/download-artifact@v4
              with:
                  name: docker-image
            - run: docker load < image.tar
            - name: Read version
              id: version
              uses: juliangruber/read-file-action@v1
              with:
                  path: ./version.txt
            - name: Push to ECR
              run: |
                  aws ecr get-login-password --region ${{secrets.AWS_REGION}} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com
                  VERSION="${{ steps.version.outputs.content }}"
                  VERSION="${VERSION//$'\n'}"
                  # Tag and push versioned image
                  docker tag "crm-app:${VERSION}" "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com/crm-app:${VERSION}"
                  docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com/crm-app:${VERSION}
                  # Tag and push SHA image
                  docker tag "crm-app:${VERSION}" "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com/crm-app:${GITHUB_SHA}"
                  docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com/crm-app:${GITHUB_SHA}

    update-helm-repo:
        needs: docker-push
        runs-on: ubuntu-latest
        steps:
            - name: Checkout helm repo
              uses: actions/checkout@v4
              with:
                  repository: Asher-Avraham/crm-app-helm
                  token: ${{ secrets.HELM_REPO_TOKEN }}
                  path: helm-repo
            - name: Update image tag
              run: |
                  cd helm-repo
                  sed -i "s/^  tag: .*/  tag: ${GITHUB_SHA}/" envs/dev-values.yaml
            - name: Commit and push
              run: |
                  cd helm-repo
                  git config user.name "github-actions"
                  git config user.email "github-actions@users.noreply.github.com"
                  git add envs/dev-values.yaml
                  git commit -m "Update dev image tag to ${GITHUB_SHA}" || exit 0
                  git push

    cleanup:
        needs: [docker-push, update-helm-repo]
        if: always() # runs even if other jobs fail
        runs-on: ubuntu-latest
        steps:
            - name: Delete workflow artifacts
              uses: geekyeggo/delete-artifact@v5
              with:
                  name: |
                      build-artifacts
                      docker-image
