name: CI workflow for CRM app

on:
    push:
        branches:
            - main
            - github-actions-workflow

jobs:
    setup-and-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Install yarn # only for act, remove for github #! remove
              run: npm install -g yarn

            - name: clear cache
              run: yarn cache clean # only for act, remove for github #! remove

            - name: Install dependencies
              run: yarn install

            - name: Build app
              run: yarn build

            - name: List contents of project directory
              run: ls -al .next

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: build-artifacts
                  path: ./.next
                  include-hidden-files: true

    test:
        runs-on: ubuntu-latest
        needs: setup-and-build
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: build-artifacts
                  path: .next

            - name: Install yarn # only for act, remove for github #! remove
              run: npm install -g yarn

            - name: Install dependencies
              run: yarn install

            - name: Run app
              run: yarn start &

            - name: Wait for app to start
              run: sleep 10

            - name: Test app
              run: curl http://localhost:3000 --fail --connect-timeout 10 --max-time 30

            - name: Stop app
              run: pkill node

    docker-build:
        runs-on: ubuntu-latest
        needs: setup-and-build
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: build-artifacts
                  path: .next # Download the .next directory

            - name: Build Docker image
              run: docker build -t crm-app:${{ github.sha }} .

            - name: Start E2E Environment
              run: docker compose up -d

            # # - name: Run E2E tests #TODO create e2e tests
            # #   run: yarn test:e2e

            - name: curl test
              run: |
                  sleep 5 # Wait for E2E env if needed
                  curl http://localhost:3000 --fail --connect-timeout 10 --max-time 30

            - name: Stop E2E Environment
              run:
                  docker compose down

                  # docker-push:
