services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - '3000'
        environment:
            - NODE_ENV=production
            - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/crmdb}
            - LOG_LEVEL=${LOG_LEVEL:-info}
            - PERSISTENCE=${PERSISTENCE:-true}
        networks:
            - crm_network
        depends_on:
            mongodb:
                condition: service_healthy

    mongodb:
        image: mongo:5.0
        ports:
            - '27017'
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-root}
            - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-example}
        volumes:
            - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
            - mongodb_data:/data/db
        networks:
            - crm_network
        healthcheck:
            test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    nginx:
        image: nginx:1.25
        ports:
            - '80:80'
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        networks:
            - crm_network
        depends_on:
            app:
                condition: service_started

networks:
    crm_network:
        driver: bridge

volumes:
    mongodb_data:
        driver: local
